<svg xmlns="http://www.w3.org/2000/svg" width="820" height="920" viewBox="0 0 820 920" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif" role="img">
<title>YouTube trending analytics: AWS data lake architecture</title>
