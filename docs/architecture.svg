<text class="ad" x="180" y="666">updates schema</text>

<line x1="510" y1="599" x2="510" y2="670" class="arr" marker-end="url(#ar)"/>
<text class="al" x="516" y="640">scans Parquet</text>

<rect class="viz" x="420" y="790" width="180" height="56" rx="6"/>
<text class="lb viz-t" x="510" y="812" text-anchor="middle">Tableau Public</text>
<text class="sl viz-s" x="510" y="830" text-anchor="middle">Multi-country dashboard</text>

<line x1="510" y1="726" x2="510" y2="790" class="arr" marker-end="url(#ar)"/>
<text class="al" x="516" y="762">CSV export</text>

<text class="ft" x="410" y="888" text-anchor="middle">Built by Olivia Cai · S3 · Lambda · Glue PySpark · Athena · Tableau Public · 2026</text>
